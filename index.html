<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mosiur OS ULTRA PRO</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="desktop">

    <!-- Dock -->
    <div class="dock">
        <div onclick="openApp('browser')">🌐</div>
        <div onclick="openApp('files')">📁</div>
        <div onclick="openExternal('https://youtube.com')">▶</div>
        <div onclick="openExternal('https://github.com')">💻</div>
    </div>

    <!-- Start -->
    <div class="start-btn" onclick="toggleStart()">☰</div>

    <div class="start-menu hidden" id="startMenu">
        <div onclick="openApp('browser')">Browser</div>
        <div onclick="openApp('files')">File Manager</div>
    </div>

</div>

<!-- Browser -->
<div class="window hidden" id="browser">
    <div class="title-bar" onmousedown="dragStart(event,'browser')">
        🌐 Browser
        <span onclick="closeApp('browser')">❌</span>
    </div>
    <input id="url" placeholder="Search...">
    <button onclick="go()">Go</button>
    <iframe id="frame"></iframe>
</div>

<!-- File Manager -->
<div class="window hidden" id="files">
    <div class="title-bar" onmousedown="dragStart(event,'files')">
        📁 Files
        <span onclick="closeApp('files')">❌</span>
    </div>
    <p style="padding:10px;">No files yet 😎</p>
</div>

<script src="script.js"></script>
</body>
</html>
