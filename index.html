<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device=device-width, initial-scale=1.0">
    <title>Mosiur OS - Windows 11 এর চেয়ে ভালো</title>
    <!-- Online Windows 11 Logo -->
    <link rel="icon" href="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/windows-11-icon.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="desktop" id="desktop">
        <div class="taskbar">
            <div class="start-menu" onclick="toggleStartMenu()">
                <img src="https://uxwing.com/wp-content/themes/uxwing/download/brands-and-social-media/windows-11-icon.png" alt="Start" class="start-logo">
                <span>Start</span>
            </div>
            <div class="time" id="time"></div>
        </div>
        
        <!-- Desktop Icons - Online Logos -->
        <div class="icon" onclick="openApp('chrome')">
            <img src="https://www.google.com/images/branding/product/ico/goog_g_64dp.png" alt="Chrome" class="icon-img">
            <span>Chrome</span>
        </div>
        <div class="icon" onclick="openApp('gamehub')">
            <img src="https://uxwing.com/wp-content/themes/uxwing/download/gaming-gadgets/gamepad-icon.png" alt="GameHub" class="icon-img">
            <span>GameHub</span>
        </div>
        <div class="icon" onclick="openApp('about')">
            <img src="https://uxwing.com/wp-content/themes/uxwing/download/30-information-security-icons/information-icon.png" alt="About" class="icon-img">
            <span>About</span>
        </div>
    </div>

    <!-- Google Chrome Browser -->
    <div class="app-window hidden" id="chrome">
        <div class="titlebar" onmousedown="startDrag(event, 'chrome')">
            <span>🟢 Google Chrome</span>
            <div>
                <button class="window-btn" onclick="minimizeApp('chrome')">−</button>
                <button class="window-btn" onclick="maximizeApp('chrome')">□</button>
                <button class="window-btn close-btn" onclick="closeApp('chrome')">✕</button>
            </div>
        </div>
        <div class="content chrome-content">
            <div class="chrome-addrbar">
                <span>🔒 https://www.google.com</span>
            </div>
            <iframe src="https://www.google.com" width="100%" height="450px" frameborder="0"></iframe>
        </div>
    </div>

    <!-- GameHub -->
    <div class="app-window hidden" id="gamehub">
        <div class="titlebar" onmousedown="startDrag(event, 'gamehub')">
            <span>🎮 GameHub</span>
            <div>
                <button class="window-btn" onclick="minimizeApp('gamehub')">−</button>
                <button class="window-btn" onclick="maximizeApp('gamehub')">□</button>
                <button class="window-btn close-btn" onclick="closeApp('gamehub')">✕</button>
            </div>
        </div>
        <div class="content">
            <h2>🎮 Game Hub Ready!</h2>
            <iframe src="https://emulatorjs.org" width="100%" height="400px" frameborder="0"></iframe>
        </div>
    </div>

    <!-- About -->
    <div class="app-window hidden" id="about">
        <div class="titlebar" onmousedown="startDrag(event, 'about')">
            <span>ℹ️ Mosiur OS</span>
            <div>
                <button class="window-btn" onclick="minimizeApp('about')">−</button>
                <button class="window-btn" onclick="maximizeApp('about')">□</button>
                <button class="window-btn close-btn" onclick="closeApp('about')">✕</button>
            </div>
        </div>
        <div class="content">
            <h2>🌟 Mosiur OS v1.0</h2>
            <p><b>👨‍💻 Creator:</b> Mosiur Rahman<br>
            <b>📍 Location:</b> Dhaka, Bangladesh<br>
            <b>💻 Tech:</b> HTML5 + CSS3 + JavaScript<br>
            <b>🚀 Status:</b> Windows 11 এর চেয়ে Better!</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
